<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shipment Price Predictor</title>
    <!-- Outfit & Inter Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
        --accent-primary: #0d9488;
        --accent-secondary: #7c3aed;
        --glass-bg: rgba(255, 255, 255, 0.02);
        --glass-border: rgba(255, 255, 255, 0.06);
        --text-main: #f3f4f6;
        --text-muted: #9ca3af;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-gradient);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        overflow-x: hidden;
      }

      /* Glassmorphic Container */
      .container {
        width: 100%;
        max-width: 900px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        position: relative;
      }

      /* Decorative glowing circles */
      .container::before,
      .container::after {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        z-index: -1;
        filter: blur(80px);
        opacity: 0.15;
      }
      .container::before {
        top: -100px;
        left: -100px;
        background: var(--accent-primary);
      }
      .container::after {
        bottom: -100px;
        right: -100px;
        background: var(--accent-secondary);
      }

      h1 {
        font-family: "Outfit", sans-serif;
        font-size: 2.2rem;
        font-weight: 800;
        text-align: center;
        margin-bottom: 8px;
        background: linear-gradient(to right, #00f2fe, #4facfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.5px;
      }

      .subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 35px;
        font-weight: 300;
      }

      /* Input Grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      @media (max-width: 768px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 500px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label {
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
      }

      /* Inputs & Select Elements */
      input,
      select {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 12px 16px;
        font-family: inherit;
        font-size: 0.95rem;
        color: var(--text-main);
        outline: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      input:focus,
      select:focus {
        border-color: #00f2fe;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
      }

      select option {
        background: #111827;
        color: var(--text-main);
      }

      /* Submit Button */
      .btn-submit {
        grid-column: 1 / -1;
        margin-top: 25px;
        background: linear-gradient(
          135deg,
          var(--accent-primary) 0%,
          var(--accent-secondary) 100%
        );
        border: none;
        border-radius: 14px;
        padding: 15px;
        font-family: "Outfit", sans-serif;
        font-size: 1.1rem;
        font-weight: 600;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(124, 58, 237, 0.55);
        filter: brightness(1.1);
      }

      .btn-submit:active {
        transform: translateY(0);
      }

      /* Result Area */
      .result-box {
        margin-top: 35px;
        padding: 24px;
        border-radius: 16px;
        text-align: center;
        background: rgba(13, 148, 136, 0.05);
        border: 1px dashed rgba(13, 148, 136, 0.2);
        animation: fadeIn 0.5s ease-out;
      }

      .result-box.error {
        background: rgba(239, 68, 68, 0.05);
        border-color: rgba(239, 68, 68, 0.2);
      }

      .result-label {
        font-size: 0.85rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 5px;
      }

      .result-val {
        font-family: "Outfit", sans-serif;
        font-size: 2.2rem;
        font-weight: 800;
        color: #00f2fe;
        text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
      }

      .result-box.error .result-val {
        color: #ef4444;
        text-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        font-size: 1.2rem;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Shipment Price Predictor</h1>
      <p class="subtitle">
        Enter the sculpture details to predict shipping cost
      </p>

      <form action="/predict" method="post">
        <div class="grid">
          <!-- Group 1: Numerical Details -->
          <div class="form-group">
            <label for="artist_reputation">Artist Reputation (0.0 - 1.0)</label>
            <input
              type="number"
              step="0.01"
              min="0.0"
              max="1.0"
              name="artist_reputation"
              id="artist_reputation"
              required
              value="0.25"
            />
          </div>

          <div class="form-group">
            <label for="height">Height (inches)</label>
            <input
              type="number"
              step="0.1"
              min="0.0"
              name="height"
              id="height"
              required
              value="17.0"
            />
          </div>

          <div class="form-group">
            <label for="width">Width (inches)</label>
            <input
              type="number"
              step="0.1"
              min="0.0"
              name="width"
              id="width"
              required
              value="6.0"
            />
          </div>

          <div class="form-group">
            <label for="weight">Weight (lbs)</label>
            <input
              type="number"
              step="0.1"
              min="0.0"
              name="weight"
              id="weight"
              required
              value="4128.0"
            />
          </div>

          <div class="form-group">
            <label for="price_of_sculpture">Sculpture Price ($)</label>
            <input
              type="number"
              step="0.01"
              min="0.0"
              name="price_of_sculpture"
              id="price_of_sculpture"
              required
              value="13.91"
            />
          </div>

          <div class="form-group">
            <label for="base_shipping_price">Base Shipping Price ($)</label>
            <input
              type="number"
              step="0.01"
              min="0.0"
              name="base_shipping_price"
              id="base_shipping_price"
              required
              value="16.27"
            />
          </div>

          <!-- Group 2: Categorical Options -->
          <div class="form-group">
            <label for="material">Material</label>
            <select name="material" id="material" required>
              <option value="Brass">Brass</option>
              <option value="Clay">Clay</option>
              <option value="Aluminium">Aluminium</option>
              <option value="Wood">Wood</option>
              <option value="Marble">Marble</option>
              <option value="Bronze">Bronze</option>
              <option value="Stone">Stone</option>
            </select>
          </div>

          <div class="form-group">
            <label for="international">International Shipment</label>
            <select name="international" id="international" required>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>

          <div class="form-group">
            <label for="express_shipment">Express Shipment</label>
            <select name="express_shipment" id="express_shipment" required>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>

          <div class="form-group">
            <label for="installation_included">Installation Included</label>
            <select
              name="installation_included"
              id="installation_included"
              required
            >
              <option value="Yes">Yes</option>
              <option value="No" selected>No</option>
            </select>
          </div>

          <div class="form-group">
            <label for="transport">Transport Mode</label>
            <select name="transport" id="transport" required>
              <option value="Airways">Airways</option>
              <option value="Roadways">Roadways</option>
              <option value="Waterways">Waterways</option>
            </select>
          </div>

          <div class="form-group">
            <label for="fragile">Is Fragile?</label>
            <select name="fragile" id="fragile" required>
              <option value="Yes">Yes</option>
              <option value="No" selected>No</option>
            </select>
          </div>

          <div class="form-group">
            <label for="customer_information">Customer Class</label>
            <select
              name="customer_information"
              id="customer_information"
              required
            >
              <option value="Working Class">Working Class</option>
              <option value="Wealthy">Wealthy</option>
            </select>
          </div>

          <div class="form-group">
            <label for="remote_location">Remote Location?</label>
            <select name="remote_location" id="remote_location" required>
              <option value="Yes">Yes</option>
              <option value="No" selected>No</option>
            </select>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-submit">
            Predict Shipping Cost
          </button>
        </div>
      </form>

      <!-- Prediction Result Output Area -->
      {% if context == "Predicted" %}
      <div class="result-box">
        <p class="result-label">Estimated Shipping Cost</p>
        <p class="result-val">{{ cost }}</p>
      </div>
      {% elif context == "Error" %}
      <div class="result-box error">
        <p class="result-label">Error Occurred</p>
        <p class="result-val">{{ cost }}</p>
      </div>
      {% endif %}
    </div>
  </body>
</html>
